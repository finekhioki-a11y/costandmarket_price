<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCM 原価・相場価格管理</title>
  <link rel="manifest" href="manifest.json">
  <!-- iOS用のホーム画面追加アイコン設定 -->
  <link rel="apple-touch-icon" href="icon_ff.jpg">
  <style>
    /* ==========================================
       共通・リセットスタイル
       ========================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f7fafc;
      color: #2d3748;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 600px;
      padding: 16px;
      position: relative;
    }

    /* 共通非表示クラス */
    .hidden {
      display: none !important;
    }

    /* ==========================================
       1. スプラッシュ画面
       ========================================== */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-color: #ffffff; /* 画像周囲の背景色 */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1.5s ease; /* 1.5秒かけてフェードアウト */
    }
    .splash-img {
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      padding: 32px;
      box-sizing: border-box;
    }

    /* ==========================================
       ヘッダー
       ========================================== */
    header {
      width: 100%;
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      min-height: 48px;
    }
    .back-btn {
      background-color: #718096;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-right: 12px;
      transition: background-color 0.2s;
    }
    .back-btn:hover {
      background-color: #4a5568;
    }
    .page-title {
      font-size: 1.25rem;
      font-weight: bold;
    }

    /* ==========================================
       2. おしながき画面（メインメニュー）
       ========================================== */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 20px;
    }
    .menu-btn {
      background-color: #4a5568; /* 同一色：#4a5568 */
      color: white;
      border: none;
      padding: 24px 16px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.2s, transform 0.1s;
      text-align: center;
    }
    .menu-btn:hover {
      background-color: #2d3748;
    }
    .menu-btn:active {
      transform: scale(0.98);
    }
    .menu-btn.blank {
      background-color: #edf2f7;
      color: #a0aec0;
      border: 2px dashed #cbd5e0;
      box-shadow: none;
      cursor: default;
    }
    .menu-btn.blank:hover {
      background-color: #edf2f7;
    }

    /* ==========================================
       3. 階層カテゴリ画面
       ========================================== */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    /* ==========================================
       4. 詳細画面
       ========================================== */
    .detail-layout {
      display: flex;
      flex-direction: column;
      gap: 20px;
      background-color: white;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    @media (min-width: 480px) {
      .detail-layout {
        flex-direction: row;
      }
    }
    .detail-image-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .detail-image {
      max-width: 100%;
      max-height: 250px;
      height: auto;
      border-radius: 8px;
      object-fit: cover;
    }
    .detail-table-container {
      flex: 1.2;
    }
    .cost-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    .cost-table th, .cost-table td {
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 12px;
      text-align: left;
    }
    .cost-table th {
      background-color: #f7fafc;
      font-weight: bold;
      color: #4a5568;
    }
    .cost-table tr.total-row {
      font-weight: bold;
      background-color: #edf2f7;
      border-top: 2px solid #cbd5e0;
    }
    .cost-table tr.total-row td {
      border-bottom: none;
    }
    .text-right {
      text-align: right;
    }

    /* ==========================================
       PWA 独自インストールポップアップ
       ========================================== */
    #pwa-install-prompt {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      background-color: white;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      border-radius: 12px;
      padding: 20px;
      z-index: 10000;
      border: 1px solid #e2e8f0;
    }
    .prompt-content h3 {
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: #2d3748;
      font-weight: bold;
    }
    .prompt-content p {
      font-size: 0.85rem;
      color: #718096;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    .prompt-buttons {
      display: flex;
      gap: 12px;
    }
    .prompt-btn-primary {
      flex: 1.5;
      background-color: #4a5568;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .prompt-btn-secondary {
      flex: 1;
      background-color: #edf2f7;
      color: #4a5568;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .ios-instruction-box {
      background-color: #f7fafc;
      padding: 12px;
      border-radius: 6px;
      border-left: 4px solid #4a5568;
    }
    .ios-text {
      font-size: 0.85rem;
      line-height: 1.5;
      color: #2d3748;
    }
  </style>
</head>
<body>

  <!-- 1. スプラッシュ画面 -->
  <div id="splash-screen">
    <img src="splash_fine.jpg" alt="" class="splash-img">
  </div>

  <div class="container">
    <!-- 2. おしながき画面（メインメニュー） -->
    <div id="menu-screen" class="hidden">
      <header>
        <div class="page-title">おしながき</div>
      </header>
      <div class="menu-grid" id="main-menu-container">
        <!-- JSで自動配置 -->
      </div>
    </div>

    <!-- 3. 階層カテゴリ画面 -->
    <div id="category-screen" class="hidden">
      <header>
        <button class="back-btn" onclick="navigateTo('menu')">戻る</button>
        <div class="page-title" id="category-title">カテゴリ</div>
      </header>
      <div class="category-grid" id="category-items-container">
        <!-- JSで自動配置 -->
      </div>
    </div>

    <!-- 4. 詳細画面 -->
    <div id="detail-screen" class="hidden">
      <header>
        <button class="back-btn" id="detail-back-btn">戻る</button>
        <div class="page-title" id="detail-title">商品詳細</div>
      </header>
      <div class="detail-layout">
        <div class="detail-image-container">
          <img id="detail-img" src="" alt="" class="detail-image">
        </div>
        <div class="detail-table-container">
          <table class="cost-table">
            <thead>
              <tr>
                <th>材料</th>
                <th>分量</th>
                <th class="text-right">原価(円)</th>
              </tr>
            </thead>
            <tbody id="detail-table-body">
              <!-- JSで自動配置 -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- PWA 独自インストールポップアップUI -->
  <div id="pwa-install-prompt" class="hidden">
    <div class="prompt-content">
      <h3>アプリとして追加する</h3>
      <p>このアプリをホーム画面に追加すると、オフライン時でもいつでも簡単に原価を確認できます。</p>
      
      <div class="prompt-buttons" id="pwa-standard-buttons">
        <button id="pwa-close-btn" class="prompt-btn-secondary">今はしない</button>
        <button id="pwa-install-btn" class="prompt-btn-primary">インストール</button>
      </div>

      <div id="pwa-ios-instruction" class="hidden">
        <div class="ios-instruction-box">
          <p class="ios-text">
            Safari下部にある<strong>「共有ボタン（四角から矢印が飛び出ているアイコン）」</strong>をタップし、メニュー内の<strong>「ホーム画面に追加」</strong>を選択してください。
          </p>
        </div>
        <button id="pwa-close-ios-btn" class="prompt-btn-secondary" style="width:100%; margin-top:12px;">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    /* ==========================================
       データ管理用オブジェクト
       ========================================== */
    const menuData = {
      // 2. おしながきカテゴリ
      categories: [
        {
          id: "udon_ramen",
          name: "うどん／ラーメン",
          items: [
            { id: "kyofu_ramen", name: "京風ラーメン", image: "kyofu_ramen.jpg" },
            { id: "tanmen", name: "たんめん", image: "tanmen.jpg" } // 画像を反映
          ]
        },
        {
          id: "meshi_bread",
          name: "めし／パン類",
          items: [
            { id: "ch_sand", name: "クラブハウスサンド", image: "ch_sand.jpg" } // 新規追加
          ]
        },
        {
          id: "pizza_pasta",
          name: "ピザ／パスタ",
          items: [
            { id: "napo", name: "ナポリタン", image: "napo.jpg" } // 新規追加
          ]
        },
        { id: "sets", name: "セット", items: [] },
        {
          id: "sweets",
          name: "スイーツ",
          items: [
            { id: "sifon_cake", name: "シフォンケーキ", image: "sifon_cake.jpg" } // 新規追加
          ]
        },
        { id: "blank", name: "（空欄）", items: [], isBlank: true }
      ],
      
      // 4. 各種商品の原価データ（新規追加メニューを京風ラーメンを参考に作成）
      ingredients: {
        kyofu_ramen: [
          { name: "麺", amount: "10g", price: 28 },
          { name: "かき揚げ", amount: "1枚", price: 35 },
          { name: "乾のり", amount: "2枚", price: 4 },
          { name: "ねぎ", amount: "-", price: 25 },
          { name: "だし", amount: "-", price: 5 }
        ],
        tanmen: [
          { name: "中華麺", amount: "150g", price: 30 },
          { name: "キャベツ", amount: "50g", price: 12 },
          { name: "もやし", amount: "50g", price: 5 },
          { name: "豚肉", amount: "30g", price: 35 },
          { name: "スープ（塩）", amount: "-", price: 20 }
        ],
        napo: [
          { name: "スパゲティ", amount: "100g", price: 20 },
          { name: "ベーコン", amount: "20g", price: 25 },
          { name: "玉ねぎ", amount: "30g", price: 8 },
          { name: "ピーマン", amount: "1/2個", price: 10 },
          { name: "ケチャップ・調味料", amount: "-", price: 15 }
        ],
        ch_sand: [
          { name: "食パン（8枚切）", amount: "3枚", price: 24 },
          { name: "鶏むね肉", amount: "40g", price: 32 },
          { name: "ベーコン", amount: "1枚", price: 18 },
          { name: "トマト", amount: "1/4個", price: 15 },
          { name: "レタス", amount: "1枚", price: 10 },
          { name: "マヨネーズ・ソース", amount: "-", price: 8 }
        ],
        sifon_cake: [
          { name: "薄力粉", amount: "20g", price: 5 },
          { name: "卵", amount: "1個", price: 22 },
          { name: "砂糖", amount: "15g", price: 4 },
          { name: "サラダ油", amount: "10ml", price: 3 },
          { name: "生クリーム", amount: "30g", price: 25 }
        ]
      }
    };

    let currentCategoryId = null;

    /* ==========================================
       アプリケーション初期化
       ========================================== */
    window.addEventListener('DOMContentLoaded', () => {
      // 1. スプラッシュ表示切り替え（最優先で実行）
      try {
        handleSplashScreen();
      } catch (err) {
        console.error("スプラッシュ画面エラー:", err);
        forceShowMenu();
      }

      // 2. メインメニュー生成
      try {
        initMainMenu();
      } catch (err) {
        console.error("メインメニュー生成エラー:", err);
      }

      // 3. インストールプロンプト設定
      try {
        initInstallPrompt();
      } catch (err) {
        console.error("インストールプロンプトエラー:", err);
      }
    });

    // スプラッシュ画面（1秒待機後、1.5秒かけてフェードアウト）
    function handleSplashScreen() {
      const splash = document.getElementById('splash-screen');
      const menu = document.getElementById('menu-screen');
      
      if (!splash || !menu) {
        forceShowMenu();
        return;
      }

      setTimeout(() => {
        splash.style.opacity = '0';
        
        setTimeout(() => {
          splash.classList.add('hidden');
          menu.classList.remove('hidden');
        }, 1500);
      }, 1000);
    }

    // 強制的にメニューを表示するレスキュー処理
    function forceShowMenu() {
      const splash = document.getElementById('splash-screen');
      const menu = document.getElementById('menu-screen');
      if (splash) splash.classList.add('hidden');
      if (menu) menu.classList.remove('hidden');
    }

    // おしながき生成
    function initMainMenu() {
      const container = document.getElementById('main-menu-container');
      if (!container) return;
      container.innerHTML = '';

      menuData.categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'menu-btn';
        if (cat.isBlank) {
          btn.classList.add('blank');
          btn.textContent = cat.name;
        } else {
          btn.textContent = cat.name;
          btn.onclick = () => showCategoryPage(cat.id);
        }
        container.appendChild(btn);
      });
    }

    // カテゴリ画面
    function showCategoryPage(catId) {
      currentCategoryId = catId;
      const category = menuData.categories.find(c => c.id === catId);
      if (!category) return;

      const titleEl = document.getElementById('category-title');
      if (titleEl) titleEl.textContent = category.name;

      const container = document.getElementById('category-items-container');
      if (!container) return;
      container.innerHTML = '';

      if (category.items.length === 0) {
        container.innerHTML = '<p style="grid-column: span 2; text-align: center; color: #a0aec0; padding: 20px;">データがありません</p>';
      } else {
        category.items.forEach(item => {
          const btn = document.createElement('button');
          btn.className = 'menu-btn';
          btn.textContent = item.name;
          btn.onclick = () => showDetailPage(item);
          container.appendChild(btn);
        });
